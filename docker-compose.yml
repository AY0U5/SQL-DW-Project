services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    user: root
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=$SQL_SERVER_PASSWORD
    ports:
      - "1433:1433"
    volumes:
      - sqlserverdata:/var/opt/mssql
      - /Users/ayoub/projects/Data warehouse/SQL-DW-Project/datasets:/var/opt/mssql/datasets

volumes:
  sqlserverdata: